name: PrayerLock
attributes:
  LastUpgradeCheck: "2650"
  LastSwiftMigration: "2650"
options:
  bundleIdPrefix: prayer.lock
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

schemes:
  PrayerLock:
    build:
      targets:
        PrayerLock: all
    run:
      config: Debug
    archive:
      config: Release

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: PVQK77DQWL         # applied to app + all 3 extensions
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  PrayerLock:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
      - path: Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Prayer Lock
        UILaunchScreen:
          UIColorName: LaunchCream
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UIUserInterfaceStyle: Light
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Newsreader-Light.ttf
          - Newsreader-Regular.ttf
          - Newsreader-Medium.ttf
          - Newsreader-SemiBold.ttf
          - Newsreader-Bold.ttf
          - Newsreader-Italic.ttf
          - Newsreader-MediumItalic.ttf
          - HankenGrotesk-Regular.ttf
          - HankenGrotesk-Medium.ttf
          - HankenGrotesk-SemiBold.ttf
          - HankenGrotesk-Bold.ttf
          - HankenGrotesk-ExtraBold.ttf
    settings:
      base:
        PRODUCT_NAME: PrayerLock
        PRODUCT_BUNDLE_IDENTIFIER: prayer.lock.app
        CODE_SIGN_ENTITLEMENTS: App/PrayerLock.entitlements
    dependencies:
      - target: Monitor
      - target: Shield
      - target: ShieldAction

  Monitor:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/Monitor
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: Monitor
        PRODUCT_BUNDLE_IDENTIFIER: prayer.lock.app.monitor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/Monitor/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/Monitor/Monitor.entitlements

  Shield:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/Shield
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: Shield
        PRODUCT_BUNDLE_IDENTIFIER: prayer.lock.app.shield
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/Shield/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/Shield/Shield.entitlements

  ShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/ShieldAction
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: ShieldAction
        PRODUCT_BUNDLE_IDENTIFIER: prayer.lock.app.shieldaction
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/ShieldAction/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/ShieldAction/ShieldAction.entitlements
